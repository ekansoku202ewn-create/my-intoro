<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Whisper | AI Joke App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>
    
    <main class="container">
        <header class="app-header">
            <h1 class="title">Midnight Whisper</h1>
            <p class="subtitle">秘密のセリフ、聞かせてあげる…</p>
        </header>

        <section class="glass-card main-card">
            <div class="upload-section">
                <p class="instruction">好きな画像を選んでね💋<br><small style="font-size: 0.8rem; color: var(--text-muted);">（2枚選ぶと掛け合いになります）</small></p>
                <div class="upload-buttons">
                    <label for="image-upload-1" class="neon-btn upload-btn small-btn">
                        <span>左の画像</span>
                        <input type="file" id="image-upload-1" accept="image/*" class="hidden-input">
                    </label>
                    <label for="image-upload-2" class="neon-btn upload-btn small-btn">
                        <span>右の画像</span>
                        <input type="file" id="image-upload-2" accept="image/*" class="hidden-input">
                    </label>
                </div>
            </div>

            <div class="ai-generation-section">
                <p class="instruction ai-instruction">または、AIに作ってもらう✨</p>
                <div class="ai-input-group">
                    <select id="ai-style-type" class="neon-input style-select">
                        <option value="realistic">リアル（実写風）</option>
                        <option value="anime">二次元（アニメ風）</option>
                    </select>
                    <input type="text" id="ai-prompt" class="neon-input prompt-input" placeholder="どんな画像がいい？ (例: 教室で微笑むJK)">
                </div>
                <div class="ai-input-group">
                    <input type="text" id="fetish-prompt" class="neon-input" style="margin-bottom: 0;" placeholder="フェチを入力 (任意) (例: 黒ストッキング)">
                </div>
                <div class="upload-buttons ai-buttons">
                    <button id="ai-generate-1" class="neon-btn upload-btn small-btn">左に生成 🪄</button>
                    <button id="ai-generate-2" class="neon-btn upload-btn small-btn">右に生成 🪄</button>
                </div>
            </div>

            <div id="image-preview-container" class="preview-container hidden">
                <!-- Image 1 -->
                <div class="image-wrapper" id="wrapper-1">
                    <img id="image-preview-1" src="" alt="プレビュー画像1" class="preview-image" crossorigin="anonymous">
                    <div id="speech-bubble-1" class="speech-bubble bubble-left hidden">
                        <p id="joke-text-1"></p>
                    </div>
                    <div class="image-controls hidden" id="controls-1">
                        <button class="ctrl-btn save-btn" data-target="1" title="保存">💾</button>
                        <button class="ctrl-btn mosaic-btn" data-target="1" title="モザイク">⬛</button>
                        <button class="ctrl-btn qr-btn" data-target="1" title="QR作成 (AI画像のみ)">📱</button>
                    </div>
                </div>
                <!-- Image 2 (Hidden by default until 2 images are uploaded) -->
                <div class="image-wrapper hidden" id="wrapper-2">
                    <img id="image-preview-2" src="" alt="プレビュー画像2" class="preview-image" crossorigin="anonymous">
                    <div id="speech-bubble-2" class="speech-bubble bubble-right hidden">
                        <p id="joke-text-2"></p>
                    </div>
                    <div class="image-controls hidden" id="controls-2">
                        <button class="ctrl-btn save-btn" data-target="2" title="保存">💾</button>
                        <button class="ctrl-btn mosaic-btn" data-target="2" title="モザイク">⬛</button>
                        <button class="ctrl-btn qr-btn" data-target="2" title="QR作成 (AI画像のみ)">📱</button>
                    </div>
                </div>
            </div>

            <div class="action-section">
                <select id="personality-select" class="neon-input" style="margin-bottom: 1rem; text-align: center; cursor: pointer;">
                    <option value="standard">標準 (妖艶)</option>
                    <option value="s">ドS (強気・責め)</option>
                    <option value="m">ドM (弱気・服従)</option>
                    <option value="none">今はその気分ではない</option>
                </select>
                <button id="generate-btn" class="neon-btn generate-btn" disabled>囁かせる 🫦</button>
            </div>

            <div class="secondary-action-section">
                <button id="find-hotel-btn" class="neon-btn outline-btn">今すぐ近くのホテルを探す 🏩</button>
            </div>
        </section>
    </main>

    <!-- QR Code Modal -->
    <div id="qr-modal" class="modal hidden">
        <div class="modal-content glass-card">
            <span class="close-modal" id="close-qr">&times;</span>
            <p>このAI画像のQRコードです</p>
            <img id="qr-image" src="" alt="QR Code">
        </div>
    </div>

    <!-- Panic Button -->
    <button id="panic-btn" class="panic-btn" title="緊急回避 (Escキー)">👁️‍🗨️</button>

    <!-- Fake Safe Site (Google clone) -->
    <div id="fake-site" class="fake-site hidden">
        <div class="fake-header">
            <span>Gmail</span>
            <span>Images</span>
            <div class="fake-avatar"></div>
        </div>
        <div class="fake-main">
            <div class="fake-logo">
                <span style="color:#4285F4">G</span><span style="color:#EA4335">o</span><span style="color:#FBBC05">o</span><span style="color:#4285F4">g</span><span style="color:#34A853">l</span><span style="color:#EA4335">e</span>
            </div>
            <div class="fake-search-bar">
                <span class="search-icon">🔍</span>
            </div>
            <div class="fake-buttons">
                <button>Google Search</button>
                <button>I'm Feeling Lucky</button>
            </div>
        </div>
        <!-- Return Button -->
        <button id="return-btn" class="panic-btn" style="color: #ccc;" title="元のサイトに戻る">👁️‍🗨️</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
